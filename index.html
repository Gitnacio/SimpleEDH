<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SimlpeEDH</title>
        <link rel="icon" type="image/svg+xml" href="cmd.svg">
        <link rel="stylesheet" href="CounterStyles.css">
    </head>

    <body>
        <button id="btn_sett" class="btn_sett">⚙️</button>
        <dialog id="menu_sett" class="modal">
            <h2>Settings</h2>

            <div class="menu_option">
                <label for="theme_lbl">Theme </label>
                <select id="theme_select">
                    <option value="default">Default</option>
                    <option value="white">White</option>
                    <option value="blue">Blue</option>
                    <option value="black">Black</option>
                    <option value="red">Red</option>
                    <option value="green">Green</option>
                </select>
            </div>

            <div class="menu_option">
                <label for="opponents_nmb">Opponents </label>
                <select id="opponents_select">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>

            <button id="btn_close_sett" class="back_btn">Close</button>
        </dialog>
        
        <div class="cmd_cont">
            <div class="single_cmd_cont">
                <button id="cmd_1_btn" class="cmd_btn">0</button>
                <button id="cmd_1_mns_btn" class="cmd_mns_btn">-1</button>
            </div>

            <div class="single_cmd_cont">
                <button id="cmd_2_btn" class="cmd_btn">0</button>
                <button id="cmd_2_mns_btn" class="cmd_mns_btn">-1</button>
            </div>

            <div class="single_cmd_cont">
                <button id="cmd_3_btn" class="cmd_btn">0</button>
                <button id="cmd_3_mns_btn" class="cmd_mns_btn">-1</button>
            </div>
        </div>

        <h2>Life Count</h2>
        <h2 id="life_txt">40</h2>

        <div class="Btns_Container">
            <button id="add_Xlife" class="Xlife_btn">+10</button>
            <button id="add_life" class="life_btn">+1</button>
            <button id="subs_life" class="life_btn">-1</button>
            <button id="subs_Xlife" class="Xlife_btn">-10</button>
        </div>

        <button id="reset_btn" class="back_btn">Reset</button>
    
    <script src="CounterLogic.js"></script>

    </body>
</html>
